<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Práctica DOM</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  
  <h2 id="titulo">Título original</h2>
  <button onclick="cambiartitulo()">Cambiar título</button>

  <p id="parrafo">Este es el párrafo original.</p>
  <button onclick="cambiarparrafo()">Cambiar párrafo</button>

  <img id="imagen" src="img/imagen1.png" alt="imagen" />
  <button onclick="cambiarImagen()">Cambiar imagen</button>

  <input id="inputTexto" type="text" placeholder="Escribe algo..." />
  <button onclick="Mostrarmensaje()">Mostrar mensaje</button>

  
  <p id="texto">Este texto cambia de color con classList</p>
  <button onclick="agregarClase()">Agregar clase roja</button>

  <p id="texto2" class="textoRojo">Este texto ya tiene la clase</p>
  <button onclick="quitarClase()">Quitar clase roja</button>

  
  <button onclick="cambiarfondo()">Modo oscuro</button>

  <input id="inputLista" type="text" placeholder="Nuevo texto..." />
  <button onclick="agregarItem()">Agregar a lista</button>
  <ul id="lista">
    <li>Elemento inicial</li>
  </ul>

  
  <h2>Formulario</h2>

  <label for="nombre">Nombre</label>
  <input type="text" id="nombre" placeholder="Tu nombre..." />
  <span class="error" id="error-nombre"></span>

  <label for="color">Color favorito</label>
  <input type="text" id="color" placeholder="Ej: azul, rojo, verde..." />
  <span class="error" id="error-color"></span>

  <label for="mensaje">Mensaje</label>
  <textarea id="mensaje" placeholder="Escribe tu mensaje..."></textarea>
  <span class="error" id="error-mensaje"></span>

  <button id="btn-enviar">Enviar</button>

  <div id="resultado" class="oculto">
    <h3>Datos recibidos:</h3>
    <p id="resultado-nombre"></p>
    <p id="resultado-color"></p>
    <p id="resultado-mensaje"></p>
  </div>

  <div id="contenedor-tarjetas"></div>

  <script src="script.js"></script>
</body>
</html>
