<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Práctica DOM</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  
  <h2 id="titulo">Título original</h2>
  <button onclick="cambiartitulo()">Cambiar título</button>

  <p id="parrafo">Este es el párrafo original.</p>
  <button onclick="cambiarparrafo()">Cambiar párrafo</button>

  <img id="imagen" src="img/imagen1.png" alt="imagen" />
  <button onclick="cambiarImagen()">Cambiar imagen</button>

  <input id="inputTexto" type="text" placeholder="Escribe algo..." />
  <button onclick="Mostrarmensaje()">Mostrar mensaje</button>

  
  <p id="texto">Este texto cambia de color con classList</p>
  <button onclick="agregarClase()">Agregar clase roja</button>
  <button onclick="quitarClase()">Quitar clase roja</button>

  
  <button onclick="cambiarfondo()">Modo oscuro</button>

  <input id="inputLista" type="text" placeholder="Nuevo ítem..." />
  <button onclick="agregarItem()">Agregar a lista</button>
  <ul id="lista">
    <li>Elemento inicial</li>
  </ul>

  <script src="script.js"></script>
</body>
</html>
