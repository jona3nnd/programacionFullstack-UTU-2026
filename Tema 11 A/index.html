<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>formulario DOM</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
   <h1>Formulario DOM</h1>
    <form id="form">
        <label for="nombre-input">Nombre:</label>
        <input type="text" id="nombre-input" placeholder="Ingrese su nombre" required>
        <label for="email-input">Email:</label>
        <input type="email" id="email-input" placeholder="Ingrese su correo electrónico" required>
        <label for="task-input">Tarea:</label>      
        <input type="text" id="task-input" placeholder="Ingrese una tarea" required>
        <p id="error-message"></p>
        <button type="submit">Agregar tarea</button>
    </form>

    
    <div>
        <span>Total: <strong id="stat-total">0</strong></span>
        <span>Completadas: <strong id="stat-done">0</strong></span>
        <span>Pendientes: <strong id="stat-pending">0</strong></span>
    </div>

    
    <button class="filter-btn active" data-filter="todas">Todas</button>
    <button class="filter-btn" data-filter="pendientes">Pendientes</button>
    <button class="filter-btn" data-filter="completadas">Completadas</button>

    
    <button id="clear-all">Borrar todas</button>

    <ul id="list"></ul>

    <script src="script.js"></script>
</body>
</html>
